{% extends "base.html" %}
{% block title %}Contact — FactuScan{% endblock %}
{% block content %}
<div
    style="max-width: 600px; margin: 6rem auto; padding: 2rem; background: var(--card); border: 1px solid var(--border); border-radius: var(--r3);">
    <h1 style="margin-bottom: 2rem; text-align: center;">Contactez-nous</h1>
    <p style="color: var(--t2); text-align: center; margin-bottom: 2rem;">Une question ? Un besoin spécifique pour votre
        entreprise ? Nous sommes à votre écoute.</p>

    <div style="display: flex; flex-direction: column; gap: 1.5rem;">
        <div
            style="display: flex; align-items: center; gap: 1rem; padding: 1rem; background: rgba(255,255,255,0.02); border-radius: var(--r2);">
            <i class="bi bi-envelope-at" style="font-size: 1.5rem; color: var(--acc);"></i>
            <div>
                <div style="font-weight: 600;">Email</div>
                <div style="color: var(--t2);">contact@factuscan.ma</div>
            </div>
        </div>
        <div
            style="display: flex; align-items: center; gap: 1rem; padding: 1rem; background: rgba(255,255,255,0.02); border-radius: var(--r2);">
            <i class="bi bi-geo-alt" style="font-size: 1.5rem; color: var(--acc3);"></i>
            <div>
                <div style="font-weight: 600;">Bureaux</div>
                <div style="color: var(--t2);">Technopark, Casablanca, Maroc</div>
            </div>
        </div>
    </div>

    <button class="btn-primary w-100" style="margin-top: 2rem;">Envoyer un message</button>
</div>
{% endblock %}
