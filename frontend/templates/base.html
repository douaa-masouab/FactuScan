<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}FactuScan - Analyse de Factures Marocaines{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/static/css/style.css">
    {% block extra_css %}{% endblock %}
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="bi bi-file-earmark-text"></i> FactuScan
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/">Accueil</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/dashboard">Tableau de bord</a>
                    </li>
                </ul>
                <div class="d-flex">
                    <button id="voice-assistant-btn" class="btn btn-outline-light me-2">
                        <i class="bi bi-mic"></i> Assistant Vocal
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <main class="container my-4">
        {% block content %}{% endblock %}
    </main>

    <footer class="bg-light text-center py-3 mt-5">
        <div class="container">
            <p>&copy; 2023 FactuScan - Tous droits réservés</p>
        </div>
    </footer>

    <!-- Voice Assistant Modal -->
    <div class="modal fade" id="voiceAssistantModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Assistant Vocal</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body text-center">
                    <div id="voice-status" class="mb-3">
                        <i class="bi bi-mic-fill text-primary" style="font-size: 3rem;"></i>
                        <p class="mt-2">Cliquez sur le bouton pour parler</p>
                    </div>
                    <div id="voice-result" class="mb-3" style="display: none;">
                        <p class="mb-1">Vous avez dit:</p>
                        <div class="card">
                            <div class="card-body" id="user-command"></div>
                        </div>
                        <p class="mt-2 mb-1">Réponse:</p>
                        <div class="card">
                            <div class="card-body" id="assistant-response"></div>
                        </div>
                    </div>
                    <button id="record-btn" class="btn btn-primary">
                        <i class="bi bi-mic-fill"></i> Enregistrer
                    </button>
                    <audio id="response-audio" controls style="display: none;" class="mt-3 w-100"></audio>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Fermer</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/main.js"></script>
    {% block extra_js %}{% endblock %}
</body>

</html>
